<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page - Recipe Sharing App</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="form-container">
        <h2>Add a New Recipe</h2>
        
        <form id="recipe-form" action="/add-recipe" method="POST" onsubmit="return validateRecipeForm()">
            
            <div class="form-group">
                <label for="recipe-name">Recipe Title</label>
                <input type="text" id="recipe-name" name="recipeName">
                <span id="nameError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="recipe-ingredients">Ingredients</label>
                <textarea id="recipe-ingredients" name="recipeIngredients" rows="4"></textarea>
                <span id="ingredientsError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="recipe-instructions">Instructions</label>
                <textarea id="recipe-instructions" name="recipeInstructions" rows="4"></textarea>
                <span id="instructionsError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="recipe-cooktime">Cooking Time (e.g., 45 mins)</label>
                <input type="text" id="recipe-cooktime" name="recipeCookTime">
                <span id="timeError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="recipe-servings">Serving Size (e.g., 4 people)</label>
                <input type="text" id="recipe-servings" name="recipeServings">
                <span id="servingsError" class="error-message"></span>
            </div>

            <div class="form-group">
                <button type="submit">Add Recipe</button>
            </div>
        </form>

        <div class="form-group" style="margin-top: 20px;">
            <button onclick="window.location.href='/logout'">Logout</button>
        </div>
    </div>

    <script src="js/app.js"></script> 
</body>
</html>
